server:
 port: 9090
spring:
 datasource:
  url: jdbc:h2:mem:testdb
  username: sa
  password:
  driver-class-name: org.h2.Driver
 jpa:
  show-sql: false
  database-platform: org.hibernate.dialect.H2Dialect
  hibernate:
   ddl-auto: update
  generate-ddl: true
  properties:
   hibernate :
    format_sql: true
 h2:
  console:
   enabled: true
   path: /h2
